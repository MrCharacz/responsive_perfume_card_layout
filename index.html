<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="StyleSheet" href="product_card.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="card" id="product_card">
        <img alt="perfume_photo_mobile" class="card_item" id="perfume_photo_deskop" src="image-product-desktop.jpg">
        <img alt="perfume_photo_mobile" class="card_item" id="perfume_photo_mobile" src="image-product-mobile.jpg">
        <div class="card_item" id="product_ui">
            <p class="ui_item" id="type">P E R F U M E</p>
            <h1 class="ui_item" id="title">Gabrielle<br> Essence Eau De Parfum</h1>
            <p class="ui_item" id="product_description">A floral, solar and voluptuous<br> 
                interpretation composed by<br> 
                Olivier Polge, Perfumer-Creator <br>
                for the House of CHANEL.<br></p><br>
            <div class="prices"><h1 class="ui_item" id="current_price">$149.99</h1>
            <h1 class="ui_item"id="old_price">$169.99</h1><br></div>
            <div class="flex"><button class="ui_item" id="add_to_card_button"><img src="icon-cart.svg" id="cart_icon" class="button-item"><span class="button-item">Add to Cart</span></button></div>
        </div>
    </div>
</body>
</html>
